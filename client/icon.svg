<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#grad1)"/>

  <!-- Chart bars -->
  <rect x="55" y="105" width="15" height="40" rx="4" fill="white"/>
  <rect x="85" y="85" width="15" height="60" rx="4" fill="white"/>
  <rect x="115" y="65" width="15" height="80" rx="4" fill="white"/>

  <!-- Dollar circle -->
  <circle cx="100" cy="60" r="18" fill="white"/>
  <text x="100" y="66" font-size="18" text-anchor="middle" fill="#4f46e5" font-family="Arial">$</text>
</svg>